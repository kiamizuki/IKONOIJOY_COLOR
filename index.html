    // グループ別の図形を切り分けて構築する関数 (イコラブ＝ハート、ノイミー＝ダイヤ、ニアジョイ＝王冠)
    function createShapeSvg(id, colors, group, isPinned = false) {
      let gradStr = '';
      const prefix = isPinned ? 'pin-' : '';
      if (colors.length === 1) {
        gradStr = `<stop offset="0%" stop-color="${colors[0]}" /><stop offset="100%" stop-color="${colors[0]}" />`;
      } else if (colors.length === 2) {
        gradStr = `<stop offset="0%" stop-color="${colors[0]}" /><stop offset="50%" stop-color="${colors[0]}" /><stop offset="50%" stop-color="${colors[1]}" /><stop offset="100%" stop-color="${colors[1]}" />`;
      } else {
        gradStr = `<stop offset="0%" stop-color="${colors[0]}" /><stop offset="50%" stop-color="${colors[1]}" /><stop offset="100%" stop-color="${colors[2]}" />`;
      }

      const isWhite = colors.every(c => c.toUpperCase() === '#FFFFFF');
      const strokeColor = isWhite ? '#cbd5e1' : '#f1f5f9';
      const glowVar = colors[0];

      let shapePath = '';
      if (group === 'equal-love') {
        // ハート型 (＝LOVE)
        shapePath = `<path d="M16,28.5 C16,28.5 3,20 3,11.5 C3,5.5 7,2.5 11.5,2.5 C14.5,2.5 16,4.5 16,4.5 C16,4.5 17.5,2.5 20.5,2.5 C25,2.5 29,5.5 29,11.5 C29,20 16,28.5 16,28.5 Z" fill="url(#${prefix}color-grad-${id})" stroke="${strokeColor}" stroke-width="1.5" />`;
      
      } else {
        // デフォルト（ハート）
        shapePath = `<path d="M16,28.5 C16,28.5 3,20 3,11.5 C3,5.5 7,2.5 11.5,2.5 C14.5,2.5 16,4.5 16,4.5 C16,4.5 17.5,2.5 20.5,2.5 C25,2.5 29,5.5 29,11.5 C29,20 16,28.5 16,28.5 Z" fill="url(#${prefix}color-grad-${id})" stroke="${strokeColor}" stroke-width="1.5" />`;
      }

      return `
        <svg viewBox="0 0 32 32" class="w-10 h-10 transition-transform duration-300 hover:scale-125 glow-effect" style="--glow-color: ${glowVar}">
          <defs>
            <linearGradient id="${prefix}color-grad-${id}" x1="0%" y1="100%" x2="100%" y2="0%">
              ${gradStr}
            </linearGradient>
          </defs>
          ${shapePath}
        </svg>
      `;
    }

    // 単色ペンライトを生成する関数
    function createSinglePenlightSvg(color, id, index, total, isPinned = false) {
      const prefix = isPinned ? 'pin-' : '';
      const gradId = `${prefix}pen-grad-${id}-${index}`;
      const isWhite = color.toUpperCase() === '#FFFFFF';
      
      // 3D風グラデーション定義
      let gradHtml = `
        <linearGradient id="${gradId}" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="${color}" />
          <stop offset="35%" stop-color="#FFFFFF" />
          <stop offset="70%" stop-color="${color}" />
          <stop offset="100%" stop-color="${color}" />
        </linearGradient>
      `;
      if (isWhite) {
        gradHtml = `
          <linearGradient id="${gradId}" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#E2E8F0" />
            <stop offset="50%" stop-color="#FFFFFF" />
            <stop offset="100%" stop-color="#CBD5E1" />
          </linearGradient>
        `;
      }

      const strokeColor = isWhite ? '#cbd5e1' : '#f8fafc';
      
      // 複数ある場合にバルログ持ち風に重ね合わせるための角度と位置計算
      let transformStyle = '';
      let marginStyle = '';
      if (total > 1) {
        const angle = -15 + (index * (30 / (total - 1)));
        const tx = -6 + (index * 6);
        transformStyle = `transform: rotate(${angle}deg) translateX(${tx}px);`;
        marginStyle = index > 0 ? 'margin-left: -18px;' : '';
      }

      const glowColor = color === '#FFFFFF' ? '#e2e8f0' : color;

      return `
        <svg viewBox="0 0 40 52" class="w-9 h-11 transition-all duration-300 hover:scale-110 hover:z-20 glow-effect" style="--glow-color: ${glowColor}; ${transformStyle} ${marginStyle} z-index: ${index + 1}; position: relative;">
          <defs>
            ${gradHtml}
          </defs>
          <!-- 持ち手 -->
          <path d="M18,34 L22,34 L23,47 A3,3 0 0,1 17,47 Z" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.2"/>
          <rect x="18" y="36" width="4" height="2" rx="0.5" fill="#94a3b8"/>
          <!-- 発光部 -->
          <rect x="13" y="6" width="14" height="27" rx="7" fill="url(#${gradId})" stroke="${strokeColor}" stroke-width="1" />
          <!-- キャップ -->
          <rect x="12" y="32" width="16" height="2.5" fill="#cbd5e1" rx="0.5"/>
        </svg>
      `;
    }

    // 各メンバーのペンライト群(本数分)を描画するラッパー
    function createPenlightsHtml(pColors, id, isPinned = false) {
      let html = '<div class="flex items-center relative h-12 pr-2">';
      pColors.forEach((color, index) => {
        html += createSinglePenlightSvg(color, id, index, pColors.length, isPinned);
      });
      html += '</div>';
      return html;
    }

            <svg class="w-3.5 h-3.5 stroke-current fill-none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
          </a>
        `;
      }

      // TikTok
      if (sns.tiktok) {
        html += `
          <a href="https://www.tiktok.com/@${sns.tiktok}" target="_blank" rel="noopener noreferrer" class="w-7 h-7 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-black hover:text-[#25f4ee] flex items-center justify-center transition-all duration-200" title="TikTok">
            <svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24">
              <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.01 1.62 4.17.94 1.09 2.27 1.8 3.71 1.95v3.91c-1.57-.16-3.05-.79-4.22-1.85-.2-.17-.39-.36-.56-.56-.06.74-.04 1.48-.04 2.22 0 3.23-.74 6.32-3.12 8.3-2.11 1.81-5.11 2.28-7.66 1.34-2.82-1.01-4.79-3.79-4.83-6.83-.07-3.41 2.31-6.65 5.67-7.23.97-.18 1.97-.18 2.94.02v3.95c-.86-.25-1.83-.16-2.61.35-.99.62-1.39 1.93-1 3 .36 1.05 1.51 1.7 2.61 1.47 1-.16 1.78-.99 1.83-2V.02z"/>
            </svg>
          </a>
        `;
      }
      
      html += '</div>';
      return html;
    }

    // お気に入りの登録・解除
    function toggleFavorite(id, event) {
      if (event) event.stopPropagation();
      const index = state.favorites.indexOf(id);
      if (index > -1) {
        state.favorites.splice(index, 1);
        showToast("お気に入りから削除しました", "★");
      } else {
        state.favorites.push(id);
        showToast("お気に入りに登録しました！", "💖");
      }
      localStorage.setItem('ikj_favorites', JSON.stringify(state.favorites));
      renderGrid();
    }

    // ダークモード切り替え
    function toggleDarkMode() {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        state.theme = 'light';
        document.getElementById('themeIconMobile').innerText = '🌙';
        document.getElementById('themeIconPC').innerText = '🌙';
      } else {
        html.classList.add('dark');
        state.theme = 'dark';
        document.getElementById('themeIconMobile').innerText = '☀️';
        document.getElementById('themeIconPC').innerText = '☀️';
      }
      localStorage.setItem('ikj_theme', state.theme);
    }

    // 初期テーマのロード
    function loadTheme() {
      if (state.theme === 'dark') {
        document.documentElement.classList.add('dark');
        document.getElementById('themeIconMobile').innerText = '☀️';
        document.getElementById('themeIconPC').innerText = '☀️';
      } else {
        document.documentElement.classList.remove('dark');
        document.getElementById('themeIconMobile').innerText = '🌙';
        document.getElementById('themeIconPC').innerText = '🌙';
      }
    }

    // クイックお気に入りフィルター
    function toggleFavoritesOnly() {
      state.favoritesOnly = !state.favoritesOnly;
      const btn = document.getElementById("favToggleBtn");
      const icon = document.getElementById("favToggleIcon");
      if (state.favoritesOnly) {
        btn.classList.add("bg-pink-500", "text-white", "border-pink-500", "hover:bg-pink-600");
        btn.classList.remove("bg-white", "dark:bg-slate-900", "text-slate-500", "dark:text-slate-400");
        icon.innerText = "★";
      } else {
        btn.classList.remove("bg-pink-500", "text-white", "border-pink-500", "hover:bg-pink-600");
        btn.classList.add("bg-white", "dark:bg-slate-900", "text-slate-500", "dark:text-slate-400");
        icon.innerText = "☆";
      }
      renderGrid();
    }

    // クイックカラーフィルター構築
    function renderColorFilters() {
      const container = document.getElementById("colorFilterContainer");
      container.innerHTML = systemColors.map(color => {
        const isActive = state.colorTag === color.id;
        const activeClass = isActive 
          ? 'ring-2 ring-offset-2 ring-pink-500 dark:ring-offset-slate-950 scale-105 font-black z-10' 
          : 'opacity-70 hover:opacity-100 scale-100';
        return `
          <button 
            onclick="filterColor('${color.id}')"
            class="px-3.5 py-1.5 rounded-full text-[11px] font-bold transition-all duration-200 ${color.class} ${activeClass}"
          >
            ${color.name}
          </button>
        `;
      }).join('');
    }

    // カードテンプレート生成 (ファンネーム＆タグが上部、カラーが横並び)
    function createMemberCard(member, isPinned = false) {
      const meta = groupMeta[member.group];
      const shapeSvg = createShapeSvg(member.id, member.mColors, member.group, isPinned);
      const penlightsHtml = createPenlightsHtml(member.pColors, member.id, isPinned);
      const snsHtml = createSnsButtonsHtml(member.sns);
      const isFav = state.favorites.includes(member.id);
      
      // メンバータグの生成
      const tagsHtml = (member.memberTags || []).map(t => 
        `<span class="text-[9px] font-medium px-2 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400">#${t}</span>`
      ).join('');

      return `
        <div class="bg-gradient-to-br ${meta.color} bg-white dark:bg-slate-900/40 rounded-2xl border ${meta.border} p-5 shadow-sm hover:shadow-md hover:border-slate-300 dark:hover:border-slate-700 transition-all duration-300 relative overflow-hidden flex flex-col justify-between h-full min-h-[300px] group">
          
          <!-- お気に入り★ & グループバッジ -->
          <div class="absolute top-3.5 right-3.5 flex items-center gap-1.5 z-10">
            <button onclick="toggleFavorite('${member.id}', event)" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/80 dark:bg-slate-800/80 shadow-xs text-sm hover:scale-110 active:scale-[0.9] transition-all text-pink-500" title="お気に入り">
              ${isFav ? '★' : '☆'}
            </button>
            <span class="text-[9px] font-black tracking-wider ${meta.badge} px-2.5 py-1 rounded-full uppercase">
              ${meta.name}
            </span>
          </div>

          <!-- メンバーヘッダー (丸アバター画像 & ローマ字ふりがな & 名前 & SNSボタン) -->
          <div class="flex items-start gap-3">
            <img 
              src="${member.imageUrl}" 
              alt="${member.name}" 
              onerror="this.src='https://placehold.co/150x150/cbd5e1/1e293b?text=${member.initials}'"
              class="w-12 h-12 rounded-full object-cover border-2 border-white dark:border-slate-800 shadow-sm flex-shrink-0"
            />
            <div class="min-w-0 pr-16">
              <span class="text-[10px] text-slate-400 dark:text-slate-500 font-bold block leading-tight tracking-wide font-mono uppercase">${member.kana}</span>
              <h3 class="text-base md:text-lg font-bold text-slate-800 dark:text-slate-100 tracking-wide mt-0.5 truncate">${member.name}</h3>
              ${snsHtml}
            </div>
          </div>

          <!-- ファンネーム＆メンバータグセクション -->
          <div class="mt-4 space-y-2">
            <!-- 推し名/ファンネーム -->
            <div class="flex items-center gap-2">
              <span class="text-[9px] font-black tracking-wide text-slate-400 dark:text-slate-500 uppercase flex-shrink-0">ファンネーム:</span>
              <span class="text-xs font-bold text-slate-700 dark:text-slate-300 truncate">${member.fanName || '未設定'}</span>
			  <span class="text-xs font-bold text-slate-700 dark:text-slate-300 truncate">${tagsHtml}</span>
            </div>
          </div>

          <!-- カラー情報エリア (横並びに綺麗に配置) -->
          <div class="mt-4 pt-4 border-t border-slate-100 dark:border-slate-800/80 grid grid-cols-2 gap-3">
            
            <!-- メンバーカラー -->
            <div class="flex items-center gap-2 p-1.5 rounded-xl border border-slate-100/50 dark:border-slate-800/50">
              <div class="flex-shrink-0">
                ${shapeSvg}
              </div>
              <div class="min-w-0 flex-1">
                <span class="text-[8px] text-slate-400 dark:text-slate-500 font-black block tracking-wider uppercase leading-none">MEMBER</span>
                <span class="text-[11px] font-bold text-slate-700 dark:text-slate-300 mt-1 block break-all leading-tight">
                  ${member.mColorName}
                </span>
              </div>
            </div>

            <!-- ペンライトカラー (クリックでコピー) -->
            <div 
              class="flex items-center gap-2 p-1.5 rounded-xl  border border-slate-100/50 dark:border-slate-800/50 cursor-pointer hover:bg-slate-100/60 dark:hover:bg-slate-800/40 transition-colors duration-150"
              onclick="copyToClipboard('${member.pColorName}', '${member.name}')"
              title="ペンライト設定をコピー"
            >
              <div class="flex-shrink-0 scale-95 origin-left">
                ${penlightsHtml}
              </div>
              <div class="min-w-0 flex-1">
                <span class="text-[8px] text-slate-400 dark:text-slate-500 font-black flex items-center gap-1 tracking-wider uppercase leading-none">
                  PENLIGHT <span class="text-[9px] text-slate-300 dark:text-slate-600"></span>
                </span>
                <span class="text-[11px] font-bold text-slate-700 dark:text-slate-300 mt-1 block break-all leading-tight">
                  ${member.pColorName}
                </span>
              </div>
            </div>

          </div>

        </div>
      `;
    }

    // データ描画エンジン
    function renderGrid() {
      const grid = document.getElementById("memberGrid");
      const pinnedGrid = document.getElementById("pinnedGrid");
      const pinnedSection = document.getElementById("pinnedSection");
      const noResults = document.getElementById("noResults");
      const resultCount = document.getElementById("resultCount");
      
      // 各フィルターを適用して抽出
      const filtered = members.filter(member => {
        // グループ
        if (state.group !== "all" && member.group !== state.group) return false;
        // カラー系統タグ
        if (state.colorTag !== "all" && !member.tags.includes(state.colorTag)) return false;
        // お気に入り限定
        if (state.favoritesOnly && !state.favorites.includes(member.id)) return false;
        // 検索クエリ
        if (state.searchQuery) {
          const query = state.searchQuery.toLowerCase().trim();
          const matchName = member.name.toLowerCase().includes(query);
          const matchKana = member.kana.toLowerCase().includes(query);
          const matchColor = member.mColorName.toLowerCase().includes(query) || member.pColorName.toLowerCase().includes(query);
          const matchFanName = member.fanName ? member.fanName.toLowerCase().includes(query) : false;
          const matchTags = member.memberTags ? member.memberTags.some(t => t.toLowerCase().includes(query)) : false;
          
          if (!matchName && !matchKana && !matchColor && !matchFanName && !matchTags) return false;
        }
        return true;
      });

      resultCount.innerText = `${filtered.length}人`;

      if (filtered.length === 0) {
        grid.innerHTML = "";
        noResults.classList.remove("hidden");
        pinnedSection.classList.add("hidden");
        return;
      }

      noResults.classList.add("hidden");

      // ピン留め（お気に入り）構築
      const favMembers = filtered.filter(m => state.favorites.includes(m.id));
      if (favMembers.length > 0 && !state.favoritesOnly) {
        pinnedSection.classList.remove("hidden");
        pinnedGrid.innerHTML = favMembers.map(m => createMemberCard(m, true)).join('');
      } else {
        pinnedSection.classList.add("hidden");
      }

      // メインリストのレンダリング
      grid.innerHTML = filtered.map(m => createMemberCard(m, false)).join('');
    }

    // グループフィルター切り替え
    function filterGroup(groupName) {
      state.group = groupName;
      const tabs = ['all', 'equal-love', 'not-equal-me', 'nearly-equal-joy'];
      tabs.forEach(tabId => {
        const tab = document.getElementById(`tab-${tabId}`);
        if (tabId === groupName) {
          if (tabId === 'all') {
            tab.className = "flex-1 py-2 text-xs md:text-sm font-bold rounded-xl transition-all duration-300 bg-white dark:bg-slate-800 text-slate-800 dark:text-white shadow-sm";
          } else if (tabId === 'equal-love') {
            // ＝LOVE: ピンク
            tab.className = "flex-1 py-2 text-xs md:text-sm font-bold rounded-xl transition-all duration-300 bg-pink-500 text-white shadow-sm";
          } else if (tabId === 'not-equal-me') {
            // ≠ME: エメラルドグリーン
            tab.className = "flex-1 py-2 text-xs md:text-sm font-bold rounded-xl transition-all duration-300 bg-emerald-500 text-white shadow-sm";
          } else if (tabId === 'nearly-equal-joy') {
            // ≒JOY: イエロー
            tab.className = "flex-1 py-2 text-xs md:text-sm font-bold rounded-xl transition-all duration-300 bg-yellow-400 text-slate-900 shadow-sm";
          }
        } else {
          tab.className = "flex-1 py-2 text-xs md:text-sm font-bold rounded-xl text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-all duration-300";
        }
      });
      renderGrid();
    }

    // 色分類フィルター
    function filterColor(colorId) {
      state.colorTag = colorId;
      renderColorFilters();
      renderGrid();
    }

    // 全てのフィルターをクリア
    function resetFilters() {
      state.group = "all";
      state.colorTag = "all";
      state.searchQuery = "";
      state.favoritesOnly = false;
      document.getElementById("searchInput").value = "";
      
      const favBtn = document.getElementById("favToggleBtn");
      favBtn.classList.remove("bg-pink-500", "text-white", "border-pink-500");
      favBtn.classList.add("bg-white", "dark:bg-slate-900", "text-slate-500");
      document.getElementById("favToggleIcon").innerText = "☆";

      filterGroup("all");
      renderColorFilters();
      renderGrid();
    }

    // クリップボードコピー処理
    function copyToClipboard(text, name) {
      const copyViaInput = (val) => {
        const tempInput = document.createElement("input");
        tempInput.style.position = "absolute";
        tempInput.style.left = "-9999px";
        tempInput.value = val;
        document.body.appendChild(tempInput);
        tempInput.select();
        const success = document.execCommand("copy");
        document.body.removeChild(tempInput);
        return success;
      };

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          showToast(`${name}のペンライト「${text}」をコピーしました！`);
        }).catch(() => {
          if(copyViaInput(text)) {
            showToast(`${name}のペンライト「${text}」をコピーしました！`);
          }
        });
      } else {
        if(copyViaInput(text)) {
          showToast(`${name}のペンライト「${text}」をコピーしました！`);
        }
      }
    }

    // トースト通知のポップアップ
    function showToast(message, icon = "📋") {
      const toast = document.getElementById("toast");
      const toastMsg = document.getElementById("toastMsg");
      const toastIcon = document.getElementById("toastIcon");
      
      toastMsg.innerText = message;
      toastIcon.innerText = icon;
      
      toast.classList.remove("opacity-0", "translate-y-3", "pointer-events-none");
      toast.classList.add("opacity-100", "translate-y-0");

      setTimeout(() => {
        toast.classList.remove("opacity-100", "translate-y-0");
        toast.classList.add("opacity-0", "translate-y-3", "pointer-events-none");
      }, 2000);
    }

    // 検索入力の監視
    document.getElementById("searchInput").addEventListener("input", (e) => {
      state.searchQuery = e.target.value;
      renderGrid();
    });

    // ページシェア用関数
    function shareOnX() {
      const shareUrl = window.location.href;
      const shareText = "＝LOVE、≠ME、≒JOYのメンバーカラーとペンライト色がすぐわかる！「イコノイジョイ メンカラ＆ペンライトカラー早見表」✨";
      const hashtags = "イコノイジョイペンライトカラー早見表";
      const xUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}&hashtags=${encodeURIComponent(hashtags)}`;
      window.open(xUrl, '_blank', 'noopener,noreferrer');
    }

    function shareOnLine() {
      const shareUrl = window.location.href;
      const lineUrl = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}`;
      window.open(lineUrl, '_blank', 'noopener,noreferrer');
    }

    function copyPageUrl() {
      const pageUrl = window.location.href;
      const copyViaInput = (val) => {
        const tempInput = document.createElement("input");
        tempInput.style.position = "absolute";
        tempInput.style.left = "-9999px";
        tempInput.value = val;
        document.body.appendChild(tempInput);
        tempInput.select();
        const success = document.execCommand("copy");
        document.body.removeChild(tempInput);
        return success;
      };

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(pageUrl).then(() => {
          showToast("ページのURLをコピーしました！", "🔗");
        }).catch(() => {
          if (copyViaInput(pageUrl)) {
            showToast("ページのURLをコピーしました！", "🔗");
          }
        });
      } else {
        if (copyViaInput(pageUrl)) {
          showToast("ページのURLをコピーしました！", "🔗");
        }
      }
    }

    // ページロード時の初期設定
    window.onload = () => {
      loadTheme();
      renderColorFilters();
      renderGrid();
    };
  </script>
</body>
</html>
